server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docusaurus emits hashed asset filenames — cache them hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /fonts/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # HTML pages change on every deploy; always revalidate.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/index.html $uri.html =404;
    }

    error_page 404 /404.html;
}
